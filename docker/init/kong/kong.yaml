_format_version: "3.0"

services:
  - name: rtcms4j-core-service
    url: http://rtcms4j-core:8080
    routes:
      - name: core-routes
        paths:
          - /core
        strip_path: true
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - HEAD
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
            - HEAD
          headers:
            - Accept
            - Authorization
            - Content-Type
            - X-Request-ID
          exposed_headers:
            - X-Total-Count
            - X-Total-Pages
          credentials: true
          max_age: 3600

  - name: rtcms4j-notify-service
    url: http://rtcms4j-notify:8080
    routes:
      - name: notify-routes
        paths:
          - /notify
        strip_path: true
        methods:
          - GET
          - POST
          - DELETE
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - DELETE
          headers:
            - Accept
            - Authorization
            - Content-Type
            - X-Request-ID
          credentials: true
          max_age: 3600
