networks:
  public_net:
    driver: bridge
  internal_net:
    driver: bridge
    internal: true

services:
  pgdb:
    image: postgres:16
    shm_size: 256mb
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./tmp/postgres:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "export PGUSER='postgres' && pg_isready -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal_net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://pgdb:5432/keycloak_db
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: keycloak

      KC_HOSTNAME: http://localhost:8080
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false

      KC_HOSTNAME_STRICT_BACKCHANNEL: false
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: true

      KC_PROXY: edge
      KC_HTTP_ENABLED: true
      KC_HTTP_HOST: 0.0.0.0

      KC_LOG_LEVEL: info
      KC_METRICS_ENABLED: true
      KC_HEALTH_ENABLED: true
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./init/keycloak:/opt/keycloak/data/import
    command: start-dev --import-realm --health-enabled=true
    depends_on:
      pgdb:
        condition: service_healthy
    ports:
      - 8080:8080
      - 9000:9000
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          exec 3<>/dev/tcp/127.0.0.1/9000;
          echo -e "GET /health/ready HTTP/1.1\r\nHost: localhost:9000\r\nConnection: close\r\n\r\n" >&3;
          if cat <&3 | grep -q "\"status\": \"UP\""; then
            exit 0
          else
            exit 1
          fi
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - internal_net
      - public_net

  valkey:
    image: valkey/valkey:9
    ports:
      - 6379:6379
    volumes:
      - ./tmp/valkey:/data
      - ./init/valkey/valkey.acl:/etc/valkey/valkey.acl:ro
      - ./init/valkey/valkey.conf:/etc/valkey/valkey.conf:ro
    command: >
      valkey-server
      /etc/valkey/valkey.conf
      --aclfile /etc/valkey/valkey.acl
    healthcheck:
      test: [ "CMD-SHELL", "valkey-cli", "--raw", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal_net

  rtcms4j-core:
    image: ghcr.io/hse-rtcms4j/rtcms4j-core-server:1.0.0
    ports:
      - 8081:8080
    volumes:
      - ./init/rtcms4j-core:/config:ro
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: /config/application.yaml
    depends_on:
      keycloak:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - internal_net

  rtcms4j-notify:
    image: ghcr.io/hse-rtcms4j/rtcms4j-notify-server:1.0.0
    ports:
      - 8082:8080
    volumes:
      - ./init/rtcms4j-notify:/config:ro
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: /config/application.yaml
    depends_on:
      keycloak:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - internal_net

  kong:
    image: kong:3.7
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8443:8443"
      - "8444:8444"
      - "8002:8002"
    environment:
      KONG_DATABASE: off
      KONG_DECLARATIVE_CONFIG: /opt/kong/kong.yaml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./init/kong/kong.yaml:/opt/kong/kong.yaml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 3
    networks:
      - public_net
      - internal_net

  rtcms4j-web:
    image: ghcr.io/hse-rtcms4j/rtcms4j-web:1.0.0
    ports:
      - "3000:3000"
    networks:
      - public_net
