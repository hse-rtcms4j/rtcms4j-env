apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otelc
spec:
  mode: deployment
  serviceAccount: otelc-collector
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15

      batch:
        send_batch_size: 10000
        timeout: 10s

      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.pod.name
            - k8s.node.name
            - k8s.container.name

      transform:
        log_statements:
          - context: log
            statements:
              - set(resource.attributes["trace_id"], trace_id.string)
              - set(resource.attributes["span_id"], span_id.string)

      resource:
        attributes:
          - action: insert
            key: loki.resource.labels
            value: service.name, trace_id, span_id

    exporters:
      # traces
      otlp/tempo:
        endpoint: tempo.observing:4317
        tls:
          insecure: true

      # metrics
      prometheusremotewrite/victoriametrics:
        endpoint: http://victoriametrics-victoria-metrics-single-server.observing:8428/api/v1/write
        resource_to_telemetry_conversion:
          enabled: true
        external_labels:
          cluster: "kubernetes"
          collector: "otel"

      # logs
      loki:
        endpoint: http://loki.observing:3100/loki/api/v1/push
        tls:
          insecure: true

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, batch]
          exporters: [otlp/tempo]

        metrics:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, batch]
          exporters: [prometheusremotewrite/victoriametrics]

        logs:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, batch, transform, resource]
          exporters: [loki]
