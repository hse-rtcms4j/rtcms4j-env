---
server:
  port: 80

spring:
  data:
    redis:
      host: valkey
      port: 6379
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:80/realms/rtcms4j/protocol/openid-connect/certs

core-api:
  base-url: http://rtcms4j-core:80

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      probes:
        enabled: true
