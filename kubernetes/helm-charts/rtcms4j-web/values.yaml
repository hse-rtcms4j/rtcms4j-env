### replicas
replicaCount: 3

### versions
image:
  repository: "ghcr.io/hse-rtcms4j/rtcms4j-web"
  tag: "1.0.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

### service
service:
  type: ClusterIP
  port: 3000

serviceAccount:
  create: false

ingress:
  enabled: true
  className: "traefik"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: rtcms4j-web.enzhine.ru
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - rtcms4j-web.enzhine.ru
      secretName: wildcard-enzhine-ru-tls

httpRoute:
  enabled: false

autoscaling:
  enabled: false

resources: {}

### probes
livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

### config maps
volumes: []
volumeMounts: []

### envs
envFrom:
  - configMapRef:
      name: rtcms4j-web-env-cm

configMapEnv:
  name: rtcms4j-web-env-cm
  data:
    VITE_CORE_API_BASE_URL: https://rtcms4j-api.enzhine.ru/core/api/v1
    VITE_NOTIFY_API_BASE_URL: https://rtcms4j-api.enzhine.ru/notify/api/v1
    VITE_KEYCLOAK_URL: https://keycloak.enzhine.ru/
    VITE_KEYCLOAK_REALM: rtcms4j
    VITE_KEYCLOAK_CLIENT_ID: rtcms4j-web

nodeSelector: {}
tolerations: []
affinity: {}
