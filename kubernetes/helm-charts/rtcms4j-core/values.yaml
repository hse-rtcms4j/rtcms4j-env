### replicas
replicaCount: 1

### versions
image:
  repository: "ghcr.io/hse-rtcms4j/rtcms4j-core-server"
  tag: "0.1.5"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations:
  instrumentation.opentelemetry.io/inject-java: "true"

podLabels: {}
podSecurityContext: {}
securityContext: {}

### service
service:
  type: ClusterIP
  port: 80

serviceAccount:
  create: false

ingress:
  enabled: false

httpRoute:
  enabled: false

autoscaling:
  enabled: false

resources: {}

### probes
livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 120
  periodSeconds: 5
readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http
  initialDelaySeconds: 120
  periodSeconds: 10

### config maps
volumeMounts:
  - name: app-config
    mountPath: /app/config
    readOnly: true

volumes:
  - name: app-config
    configMap:
      name: rtcms4j-core-cm

configMapFiles:
  name: rtcms4j-core-cm
  files:
    - "application.yaml"

### envs
envFrom:
  - configMapRef:
      name: rtcms4j-core-env-cm
  - secretRef:
      name: rtcms4j-core-env-sec

configMapEnv:
  name: rtcms4j-core-env-cm
  data:
    JDK_JAVA_OPTIONS: -Dspring.config.additional-location=/app/config/application.yaml

secretEnv:
  name: rtcms4j-core-env-sec
  data:
    SPRING_DATA_REDIS_USERNAME: rtcms4j_core
    SPRING_DATA_REDIS_PASSWORD: rtcms4j
    SPRING_DATASOURCE_USERNAME: rtcms4j_user
    SPRING_DATASOURCE_PASSWORD: rtcms4j
    KEYCLOAK_ADMIN_CLIENTID: rtcms4j-admin
    KEYCLOAK_ADMIN_CLIENTSECRET: 8cCznIV4yqXWE1JVBK4gqkLPA8tQwhXZ

nodeSelector: {}
tolerations: []
affinity: {}
