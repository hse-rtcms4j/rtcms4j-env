_format_version: "3.0"

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
      exposed_headers:
        - Authorization
      credentials: false
      max_age: 3600
      preflight_continue: false

services:
  - name: rtcms4j-core-service
    url: http://host.docker.internal:8081
    routes:
      - name: core-routes
        paths:
          - /core
        strip_path: true
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - HEAD
          - OPTIONS

  - name: rtcms4j-notify-service
    url: http://host.docker.internal:8082
    routes:
      - name: notify-routes
        paths:
          - /notify
        strip_path: true
        methods:
          - GET
          - POST
          - OPTIONS
